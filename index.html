<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Happy 2 Months</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --rose:    #c9184a;
  --blush:   #ff6b9d;
  --petal:   #fde8ef;
  --soft:    #fff4f8;
  --muted:   #e8b4c8;
  --ink:     #3a1a26;
  --gray:    #9a7080;
}

body {
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  background: var(--petal);
  touch-action: none;
}

canvas { display: block; }

/* ── OVERLAYS ── */
.overlay {
  position: fixed; inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 20;
}

/* ── START SCREEN ── */
#startScreen {
  background: rgba(253, 232, 239, 0.96);
  backdrop-filter: blur(12px);
}

.start-card {
  background: white;
  border-radius: 24px;
  padding: 48px 36px 40px;
  max-width: 340px;
  width: 88%;
  text-align: center;
  box-shadow: 0 32px 80px rgba(201,24,74,0.12), 0 2px 8px rgba(201,24,74,0.06);
  position: relative;
  animation: riseIn 0.8s cubic-bezier(.22,1,.36,1) both;
  border: 1px solid rgba(201,24,74,0.08);
}

@keyframes riseIn {
  from { opacity:0; transform: translateY(40px); }
  to   { opacity:1; transform: translateY(0); }
}

.monogram {
  width: 56px; height: 56px;
  border-radius: 50%;
  border: 1.5px solid var(--muted);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
  position: relative;
}
.monogram svg { width: 28px; height: 28px; }

.start-card h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  color: var(--ink);
  font-size: 28px;
  letter-spacing: 0.02em;
  margin-bottom: 10px;
  line-height: 1.2;
}

.start-card .sub {
  color: var(--gray);
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 24px;
}

.divider {
  width: 40px; height: 1px;
  background: var(--muted);
  margin: 20px auto;
}

.hint-text {
  color: var(--gray);
  font-size: 13px;
  line-height: 1.8;
  font-weight: 300;
}
.hint-text strong {
  color: var(--rose);
  font-weight: 500;
}

.btn {
  margin-top: 28px;
  padding: 14px 32px;
  border: 1.5px solid var(--rose);
  border-radius: 4px;
  background: transparent;
  color: var(--rose);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  width: 100%;
  transition: background 0.2s, color 0.2s;
}
.btn:hover, .btn:active {
  background: var(--rose);
  color: white;
}

/* ── END SCREEN ── */
#endScreen {
  display: none;
  background: rgba(253,232,239,0.97);
  backdrop-filter: blur(12px);
  overflow-y: auto;
  padding: 24px 0;
  align-items: flex-start;
}

.end-card {
  background: white;
  border-radius: 24px;
  padding: 48px 32px 40px;
  max-width: 380px;
  width: 90%;
  text-align: center;
  box-shadow: 0 32px 80px rgba(201,24,74,0.12);
  animation: riseIn 0.7s cubic-bezier(.22,1,.36,1) both;
  border: 1px solid rgba(201,24,74,0.08);
  margin: auto;
}

.end-card .eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--blush);
  margin-bottom: 12px;
}

.end-card h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  color: var(--ink);
  font-size: 30px;
  line-height: 1.2;
  margin-bottom: 6px;
}

.end-card .date-note {
  font-size: 12px;
  color: var(--gray);
  font-weight: 300;
  letter-spacing: 0.06em;
  margin-bottom: 28px;
}

.love-list {
  list-style: none;
  text-align: left;
  display: flex;
  flex-direction: column;
  gap: 0;
  border-top: 1px solid var(--petal);
}
.love-list li {
  padding: 14px 4px;
  font-size: 14px;
  color: var(--ink);
  font-weight: 300;
  display: flex;
  align-items: center;
  gap: 14px;
  border-bottom: 1px solid var(--petal);
  animation: fadeUp 0.5s ease both;
  line-height: 1.4;
}
.love-list li:nth-child(1){animation-delay:.05s}
.love-list li:nth-child(2){animation-delay:.12s}
.love-list li:nth-child(3){animation-delay:.19s}
.love-list li:nth-child(4){animation-delay:.26s}
.love-list li:nth-child(5){animation-delay:.33s}
.love-list li:nth-child(6){animation-delay:.40s}
.love-list li:nth-child(7){animation-delay:.47s}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(12px); }
  to   { opacity:1; transform: translateY(0); }
}

.love-list .num {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--muted);
  min-width: 20px;
  flex-shrink: 0;
}

.end-footer {
  margin-top: 28px;
}
.end-footer p {
  font-size: 12px;
  color: var(--gray);
  font-weight: 300;
  line-height: 1.8;
  font-style: italic;
}
.end-footer .sign {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-style: italic;
  color: var(--rose);
  margin-top: 16px;
  display: block;
}

/* ── TOAST ── */
#toast {
  position: fixed;
  top: 72px;
  left: 50%;
  transform: translateX(-50%) translateY(-8px);
  background: white;
  color: var(--rose);
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 17px;
  padding: 10px 24px;
  border-radius: 4px;
  z-index: 30;
  box-shadow: 0 8px 32px rgba(201,24,74,0.14);
  border: 1px solid rgba(201,24,74,0.12);
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  white-space: nowrap;
  pointer-events: none;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── PARTICLES ── */
#particles {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 4;
  overflow: hidden;
}
.ph {
  position: absolute;
  pointer-events: none;
  animation: riseHeart 2s ease-out forwards;
}
@keyframes riseHeart {
  0%   { opacity: 0.8; transform: translateY(0) scale(1); }
  100% { opacity: 0;   transform: translateY(-100px) scale(0.4); }
}

/* ── SCORE BADGE ── */
#scoreBadge {
  position: fixed;
  top: 20px; left: 20px;
  background: white;
  border-radius: 4px;
  padding: 6px 16px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--rose);
  font-size: 18px;
  box-shadow: 0 4px 16px rgba(201,24,74,0.1);
  border: 1px solid rgba(201,24,74,0.1);
  z-index: 10;
  display: none;
  align-items: center;
  gap: 8px;
  letter-spacing: 0.02em;
}

/* ── PROGRESS ── */
#progressWrap {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.85);
  border-radius: 4px;
  padding: 8px 20px;
  z-index: 10;
  display: none;
  gap: 8px;
  align-items: center;
  box-shadow: 0 4px 20px rgba(201,24,74,0.1);
  border: 1px solid rgba(201,24,74,0.08);
}
.pip {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  opacity: 0.4;
  transition: background 0.4s, opacity 0.4s, transform 0.3s;
  flex-shrink: 0;
}
.pip.done {
  background: var(--rose);
  opacity: 1;
  transform: scale(1.3);
}
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="particles"></div>
<div id="toast"></div>

<div id="scoreBadge"><span id="scoreNum">0</span> <span style="font-size:13px;color:var(--muted);font-style:normal;font-family:'DM Sans'">/ 7</span></div>
<div id="progressWrap"></div>

<!-- START SCREEN -->
<div class="overlay" id="startScreen">
  <div class="start-card">
    <div class="monogram">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 24s-9-5.5-9-12a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 6.5-9 12-9 12z" stroke="#c9184a" stroke-width="1.2" fill="none"/>
      </svg>
    </div>
    <h1>for you, Bachuu</h1>
    <p class="sub">a small love game</p>
    <div class="divider"></div>
    <p class="hint-text">
      Tap to fly through the petals<br>
      Score <strong>7</strong> to unlock your surprise
    </p>
    <button class="btn" id="startBtn">Begin</button>
  </div>
</div>

<!-- END SCREEN -->
<div class="overlay" id="endScreen">
  <div class="end-card">
    <p class="eyebrow">Two months together</p>
    <h1>Happy 2 Months, Bachuu</h1>
    <p class="date-note">Things I love about you</p>
    <ul class="love-list" id="loveList"></ul>
    <div class="end-footer">
      <p>These two months have been the most beautiful ones.<br>Thank you for being you.</p>
      <span class="sign">I love you</span>
    </div>
  </div>
</div>

<script>
const SCORE_GOAL = 7;

const THINGS_I_LOVE = [
  { num:"i",   text:"Your eyes — they literally sparkle" },
  { num:"ii",  text:"Your laugh that makes me laugh too" },
  { num:"iii", text:"How your hugs feel like home" },
  { num:"iv",  text:"The way you text me good morning" },
  { num:"v",   text:"Late night calls with you" },
  { num:"vi",  text:"Your smile that fixes everything" },
  { num:"vii", text:"The way you care so deeply" },
];

const COMPLIMENTS = [
  "your eyes",
  "that laugh",
  "your hugs",
  "good morning texts",
  "late night calls",
  "that smile",
  "the way you care",
];

// ── CANVAS ──
const canvas = document.getElementById("game");
const ctx    = canvas.getContext("2d");
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener("resize", resize);

// ── STATE ──
let started = false, finished = false;
let score = 0, pipes = [], frame = 0;
const bird = { x:90, y:0, vy:0 };

// ── PHYSICS ──
const G        = 0.12;
const FLAP     = -4.0;
const MAX_VY   = 4;
const PIPE_W   = 56;
const GAP      = 360;
const SPEED    = 1.7;
const PIPE_INT = 250;

// ── CLOUDS ──
const clouds = [];
function initClouds() {
  for(let i=0;i<5;i++) clouds.push({
    x: Math.random()*canvas.width,
    y: 30 + Math.random()*180,
    w: 60 + Math.random()*60,
    spd: 0.15 + Math.random()*0.2,
    a: 0.04 + Math.random()*0.04
  });
}
initClouds();

function updateClouds() {
  clouds.forEach(c => { c.x -= c.spd; if(c.x < -160) c.x = canvas.width+100; });
}

// ── DRAW BG ──
function drawBg() {
  // soft gradient
  const g = ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,"#fde8ef");
  g.addColorStop(1,"#fff9fb");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // clouds as soft blurs
  clouds.forEach(c => {
    ctx.save();
    ctx.globalAlpha = c.a;
    ctx.fillStyle = "#c9184a";
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w, c.w*0.4, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // faint grid lines (editorial feel)
  ctx.save();
  ctx.globalAlpha = 0.025;
  ctx.strokeStyle = "#c9184a";
  ctx.lineWidth = 1;
  for(let y=0; y<canvas.height; y+=60) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
  }
  ctx.restore();
}

// ── DRAW BIRD ──
function drawBird() {
  const angle = Math.min(Math.max(bird.vy * 2.5, -35), 45);
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(angle * Math.PI/180);
  // draw a clean SVG-style heart in canvas
  const s = 1 + Math.sin(frame*0.09)*0.04;
  ctx.scale(s, s);
  ctx.fillStyle = "#c9184a";
  ctx.beginPath();
  const hw = 14;
  ctx.moveTo(0, hw*0.4);
  ctx.bezierCurveTo(-hw*1.5, -hw*0.6, -hw*1.5, -hw*1.2, 0, -hw*0.4);
  ctx.bezierCurveTo(hw*1.5, -hw*1.2, hw*1.5, -hw*0.6, 0, hw*0.4);
  ctx.fill();
  ctx.restore();
}

// ── PIPES ──
function mkPipe() {
  const minTop = 80;
  const maxTop = canvas.height - GAP - 80;
  const top = minTop + Math.random()*(maxTop - minTop);
  pipes.push({ x: canvas.width+20, top, bottom: top+GAP, passed:false });
}

let pipeTimer = 0;

function updatePipes() {
  pipeTimer++;
  if(pipeTimer >= PIPE_INT) { mkPipe(); pipeTimer=0; }

  pipes.forEach(p => {
    p.x -= SPEED;
    if(!p.passed && p.x + PIPE_W < bird.x) {
      p.passed = true; score++;
      onScore();
    }
    // collision (slightly forgiving hitbox)
    if(bird.x+12 > p.x && bird.x-12 < p.x+PIPE_W &&
       (bird.y-12 < p.top || bird.y+12 > p.bottom)) {
      resetBird();
    }
  });

  pipes = pipes.filter(p => p.x > -140);
}

function drawPipes() {
  pipes.forEach(p => {
    // top
    ctx.fillStyle = "#e8b4c8";
    ctx.beginPath();
    ctx.roundRect(p.x, 0, PIPE_W, p.top, [0,0,8,8]);
    ctx.fill();
    // subtle inner highlight
    ctx.fillStyle = "rgba(255,255,255,0.25)";
    ctx.beginPath();
    ctx.roundRect(p.x+6, 0, 10, p.top, [0,0,4,4]);
    ctx.fill();

    // bottom
    ctx.fillStyle = "#e8b4c8";
    ctx.beginPath();
    ctx.roundRect(p.x, p.bottom, PIPE_W, canvas.height-p.bottom, [8,8,0,0]);
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.25)";
    ctx.beginPath();
    ctx.roundRect(p.x+6, p.bottom, 10, canvas.height-p.bottom, [4,4,0,0]);
    ctx.fill();

    // small heart ornament
    drawSmallHeart(p.x + PIPE_W/2, p.top - 14, 5);
    drawSmallHeart(p.x + PIPE_W/2, p.bottom + 14, 5);
  });
}

function drawSmallHeart(x, y, hw) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = "rgba(201,24,74,0.35)";
  ctx.beginPath();
  ctx.moveTo(0, hw*0.4);
  ctx.bezierCurveTo(-hw*1.5,-hw*0.6,-hw*1.5,-hw*1.2,0,-hw*0.4);
  ctx.bezierCurveTo(hw*1.5,-hw*1.2,hw*1.5,-hw*0.6,0,hw*0.4);
  ctx.fill();
  ctx.restore();
}

// ── RESET ──
function resetBird() {
  bird.y = canvas.height/2; bird.vy = 0;
  pipes = []; pipeTimer = 0;
}

// ── ON SCORE ──
function onScore() {
  updatePips();
  updateScoreBadge();
  showToast(COMPLIMENTS[Math.min(score-1, COMPLIMENTS.length-1)]);
  spawnPetals(bird.x, bird.y);
  if(score >= SCORE_GOAL) { finished = true; setTimeout(showEnd, 700); }
}

function updateScoreBadge() { document.getElementById("scoreNum").textContent = score; }

// ── TOAST ──
let toastTimer = null;
const toast = document.getElementById("toast");
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 2200);
}

// ── PETALS (canvas-drawn, no emoji) ──
const particles = document.getElementById("particles");
function spawnPetals(x, y) {
  for(let i=0;i<10;i++) {
    const p = document.createElement("canvas");
    p.width = 14; p.height = 14;
    const pc = p.getContext("2d");
    const hw = 5 + Math.random()*2;
    pc.fillStyle = `rgba(201,24,74,${0.4+Math.random()*0.4})`;
    pc.beginPath();
    pc.moveTo(7, 7+hw*0.4);
    pc.bezierCurveTo(7-hw*1.5,7-hw*0.6, 7-hw*1.5,7-hw*1.2, 7,7-hw*0.4);
    pc.bezierCurveTo(7+hw*1.5,7-hw*1.2, 7+hw*1.5,7-hw*0.6, 7,7+hw*0.4);
    pc.fill();
    p.className = "ph";
    p.style.left = (x - 20 + Math.random()*40) + "px";
    p.style.top  = (y + 10) + "px";
    p.style.animationDuration = (1.4 + Math.random()) + "s";
    p.style.animationDelay    = (Math.random()*0.3) + "s";
    particles.appendChild(p);
    setTimeout(() => p.remove(), 2600);
  }
}

// ── END ──
function showEnd() {
  const ul = document.getElementById("loveList");
  ul.innerHTML = "";
  THINGS_I_LOVE.forEach(item => {
    const li = document.createElement("li");
    li.innerHTML = `<span class="num">${item.num}</span><span>${item.text}</span>`;
    ul.appendChild(li);
  });
  document.getElementById("endScreen").style.display = "flex";
  for(let i=0;i<20;i++) setTimeout(() => {
    spawnPetals(50+Math.random()*(window.innerWidth-100), 100+Math.random()*(window.innerHeight-200));
  }, i*100);
}

// ── PIPS ──
const progressWrap = document.getElementById("progressWrap");
function buildPips() {
  progressWrap.innerHTML = "";
  for(let i=0;i<SCORE_GOAL;i++) {
    const d = document.createElement("div");
    d.className = "pip"; d.id = "pip"+i;
    progressWrap.appendChild(d);
  }
}
function updatePips() {
  for(let i=0;i<SCORE_GOAL;i++) {
    const p = document.getElementById("pip"+i);
    if(p) p.className = i < score ? "pip done" : "pip";
  }
}

// ── INPUT ──
function flap() { if(!started || finished) return; bird.vy = FLAP; }
document.addEventListener("click", e => { if(e.target.closest(".overlay")) return; flap(); });
document.addEventListener("touchstart", e => {
  if(e.target.closest(".overlay")) return;
  e.preventDefault(); flap();
}, { passive:false });

document.getElementById("startBtn").onclick = () => {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("scoreBadge").style.display  = "flex";
  document.getElementById("progressWrap").style.display = "flex";
  bird.y = canvas.height / 2;
  buildPips();
  started = true;
};

// ── LOOP ──
function update() {
  if(!started || finished) return;
  frame++;
  bird.vy += G;
  if(bird.vy > MAX_VY) bird.vy = MAX_VY;
  bird.y += bird.vy;
  if(bird.y < 0 || bird.y > canvas.height) resetBird();
  updateClouds();
  updatePipes();
}

function draw() {
  drawBg();
  drawPipes();
  drawBird();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
